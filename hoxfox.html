<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        oklch(0.08 0.025 275);
    --bg2:       oklch(0.11 0.025 275);
    --bg3:       oklch(0.15 0.03 275);
    --surface:   oklch(0.14 0.03 275);
    --border:    oklch(0.22 0.03 275);
    --lime:      oklch(0.82 0.22 145);
    --violet:    oklch(0.65 0.22 310);
    --coral:     oklch(0.72 0.22 25);
    --sky:       oklch(0.72 0.18 225);
    --text:      oklch(0.95 0.01 275);
    --text2:     oklch(0.60 0.03 275);
    --text3:     oklch(0.38 0.03 275);
    --r:         16px;
    --rL:        24px;
  }

  html, body { width: 100%; height: 100%; overflow: hidden; background: var(--bg); }

  body {
    font-family: 'DM Sans', sans-serif;
    color: var(--text);
    -webkit-font-smoothing: antialiased;
  }

  #root { width: 100%; height: 100%; }

  /* ── Orb background ── */
  .orb-field {
    position: fixed; inset: 0; z-index: 0; overflow: hidden; pointer-events: none;
  }
  .orb {
    position: absolute;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.35;
    animation: orbDrift linear infinite;
  }
  @keyframes orbDrift {
    0%   { transform: translate(0,0) scale(1); }
    33%  { transform: translate(40px,-60px) scale(1.15); }
    66%  { transform: translate(-30px,40px) scale(0.9); }
    100% { transform: translate(0,0) scale(1); }
  }

  /* ── Noise overlay ── */
  .noise {
    position: fixed; inset: 0; z-index: 1; pointer-events: none;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
    opacity: 0.03;
  }

  /* ── Screen transition ── */
  .screen {
    position: absolute; inset: 0; z-index: 2;
    display: flex; flex-direction: column; align-items: center;
    overflow-y: auto; overflow-x: hidden;
    animation: screenIn 0.5s cubic-bezier(0.22,1,0.36,1) both;
  }
  @keyframes screenIn {
    from { opacity: 0; transform: translateY(28px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .screen-exit {
    animation: screenOut 0.35s cubic-bezier(0.4,0,1,1) both;
  }
  @keyframes screenOut {
    from { opacity: 1; transform: translateY(0); }
    to   { opacity: 0; transform: translateY(-28px); }
  }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  /* ── Buttons ── */
  .btn-primary {
    display: inline-flex; align-items: center; gap: 10px;
    background: var(--lime); color: var(--bg);
    border: none; border-radius: 100px;
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 600; font-size: 15px; letter-spacing: 0.01em;
    padding: 14px 28px; cursor: pointer;
    transition: transform 0.18s, box-shadow 0.18s, background 0.18s;
    box-shadow: 0 0 32px oklch(0.82 0.22 145 / 0.3);
  }
  .btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 4px 48px oklch(0.82 0.22 145 / 0.5);
  }
  .btn-primary:active { transform: translateY(0); }

  .btn-ghost {
    display: inline-flex; align-items: center; gap: 8px;
    background: transparent; color: var(--text2);
    border: 1px solid var(--border); border-radius: 100px;
    font-family: 'DM Sans', sans-serif; font-size: 14px;
    padding: 10px 20px; cursor: pointer;
    transition: border-color 0.18s, color 0.18s, transform 0.18s;
  }
  .btn-ghost:hover { border-color: var(--text2); color: var(--text); transform: translateY(-1px); }

  .btn-icon {
    width: 40px; height: 40px; border-radius: 50%;
    background: var(--bg3); border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: background 0.18s, transform 0.18s;
    color: var(--text2);

  .btn-icon:hover { background: var(--border); color: var(--text); transform: scale(1.08); }

  /* ── Card ── */
  .card {
    background: oklch(0.13 0.03 275 / 0.8);
    backdrop-filter: blur(20px);
    border: 1px solid var(--border);
    border-radius: var(--rL);

  /* ── Pill ── */
  .pill {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 8px 16px; border-radius: 100px;
    font-size: 13px; font-weight: 500; cursor: pointer;
    transition: all 0.2s cubic-bezier(0.22,1,0.36,1);
    border: 1.5px solid var(--border);
    background: transparent; color: var(--text2);

  }
  .pill.active {

    color: var(--bg);

    transform: scale(1.04);

  /* ── Range slider ── */

  /* ── Waveform bars ── */
  .wave-bar {
    width: 3px; border-radius: 3px;
    background: var(--lime);
    animation: waveAnim ease-in-out infinite alternate;

    to   { transform: scaleY(1); opacity: 1; }

  /* ── Playlist card ── */
  .pl-card {
    border-radius: var(--r);

  .pl-card.selected::before { opacity: 1; }

  /* ── Song row ── */
  .song-row {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 12px; border-radius: 12px;
    cursor: pointer; transition: background 0.15s;

  .song-row:hover { background: var(--bg3); }

  /* ── Progress bar ── */
  .progress-bar {
    height: 2px; background: var(--border); border-radius: 2px;

  .progress-fill {

  /* ── Confetti animation ── */
  @keyframes confettiFall {
    0%   { transform: translateY(-20px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(100px) rotate(720deg); opacity: 0; }
  }
  .confetti-piece {
    position: absolute; width: 8px; height: 8px;
    border-radius: 2px;
    animation: confettiFall 1.2s ease-in forwards;

  /* ── Album float animation ── */
  @keyframes albumFloat {
    0%,100% { transform: var(--rot) translateY(0px); }
    50%      { transform: var(--rot) translateY(-10px); }
  }
  .album-art {
    position: absolute;
    border-radius: 8px;
    overflow: hidden;
    box-shadow: 0 8px 32px rgba(0,0,0,0.6);
    animation: albumFloat ease-in-out infinite;
  }
  .album-art::after {
    content:'';
    position:absolute;inset:0;
    border-radius:8px;

  /* ── Navbar ── */
  .hox-nav {
    position: absolute; top:0; left:0; right:0; z-index: 10;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 32px; height: 56px;
    background: linear-gradient(180deg, oklch(0.07 0.025 275 / 0.95) 0%, transparent 100%);
    backdrop-filter: blur(12px);

  /* ── Spinner ── */
  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner {
    width: 40px; height: 40px; border-radius: 50%;
    border: 3px solid var(--border);
    border-top-color: var(--lime);
    animation: spin 0.8s linear infinite;
  }

  /* ── Input ── */
  .text-input {
    background: var(--bg3); border: 1.5px solid var(--border);
    border-radius: 12px; padding: 14px 18px;
    color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 15px;

  }
  .text-input:focus { border-color: var(--lime); }
  .text-input::placeholder { color: var(--text3); }

  /* ── Floating label ── */
  .section-label {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 11px; font-weight: 600; letter-spacing: 0.12em;
    text-transform: uppercase; color: var(--text3);
    margin-bottom: 12px;
  }
</style>

  { id:1, title:'Blinding Lights',    artist:'The Weeknd',          genre:'pop',        dur:'3:20', match:98 },
  { id:2, title:'HUMBLE.',            artist:'Kendrick Lamar',       genre:'hiphop',     dur:'2:57', match:95 },

/* ── UTILS ── */
const colorVar = c => `var(--${c})`;

/* ── ORB FIELD ── */
const OrbField = () => (
  <div className="orb-field">
    {[
      {w:600,h:600,top:'-10%',left:'-10%',color:'oklch(0.65 0.22 310 / 0.5)',dur:'18s'},

/* ── WAVEFORM ── */
const Waveform = ({active, color='lime', bars=18, height=32}) => (

/* ── COVER ART placeholder ── */

/* ── PROGRESS STEPS ── */
const Steps = ({current}) => {

/* ══════════════════════════════════
   WAVE CANVAS — multiple → one
══════════════════════════════════ */
const SONG_FRAGMENTS = [
  'Blinding Lights','HUMBLE.','Levitating','Anti-Hero','Redbone',
  'As It Was','Heat Waves','Bad Guy','Starboy','Circles',
  'Industry Baby','Stay','Watermelon Sugar','Peaches','Montero',
  'drivers license','good 4 u','Shivers','Easy On Me','Ghost',
];

const WaveCanvas = () => {
  const canvasRef = useRef(null);
  const rafRef = useRef(null);

  useEffect(()=>{
    const canvas = canvasRef.current;
    if(!canvas) return;
    const ctx = canvas.getContext('2d');

    const LABEL_TOPS = [0.20, 0.32, 0.50, 0.63, 0.75];
    const WAVES = [
      { color:[120,60,255],  speed:0.018, freq:0.016, amp:22 },
      { color:[255,100,60],  speed:0.022, freq:0.020, amp:20 },
      { color:[60,180,255],  speed:0.015, freq:0.013, amp:24 },
      { color:[60,220,160],  speed:0.020, freq:0.018, amp:18 },
      { color:[255,200,60],  speed:0.017, freq:0.022, amp:20 },
    ];
    const phases = WAVES.map(()=>Math.random()*Math.PI*2);

    // Song fragments: each pinned to a wave with a fractional x position
    const fragments = WAVES.map((w,wi)=>
      Array.from({length:4},(_,fi)=>({
        wi, frac: 0.08 + fi*0.11 + Math.random()*0.04,
        text: SONG_FRAGMENTS[(wi*4+fi)%SONG_FRAGMENTS.length],
      }))
    ).flat();

    let dpr = devicePixelRatio;
    const resize = () => {
      dpr = devicePixelRatio;
      canvas.width  = canvas.offsetWidth  * dpr;
      canvas.height = canvas.offsetHeight * dpr;
    };
    resize();
    window.addEventListener('resize', resize);

    const getWaveY = (wi, x, W, H) => {
      const cy = H/2, mergeX = W*0.50;
      const startY = LABEL_TOPS[wi]*H;
      const rawT = Math.min(1, x/mergeX);
      const conv = rawT*rawT*(3-2*rawT);
      const baseY = startY + (cy-startY)*conv;
      const amp = WAVES[wi].amp*(1-conv);
      return baseY + amp*Math.sin(phases[wi] + x*WAVES[wi].freq);
    };

    const draw = () => {
      const W = canvas.offsetWidth;
      const H = canvas.offsetHeight;
      ctx.setTransform(dpr,0,0,dpr,0,0);
      ctx.clearRect(0,0,W,H);
      const cy = H/2, mergeX = W*0.50;

      // Subtle dot grid background
      ctx.fillStyle = 'rgba(255,255,255,0.03)';
      const gx = 40, gy = 40;
      for(let gxi=0; gxi*gx<W; gxi++){
        for(let gyi=0; gyi*gy<H; gyi++){
          ctx.beginPath();
          ctx.arc(gxi*gx+20, gyi*gy+20, 1, 0, Math.PI*2);
          ctx.fill();
        }
      }

      // Radial glow at merge point
      const grad = ctx.createRadialGradient(mergeX,cy,0,mergeX,cy,120);
      grad.addColorStop(0,'rgba(160,255,100,0.12)');
      grad.addColorStop(1,'rgba(160,255,100,0)');
      ctx.fillStyle = grad;
      ctx.fillRect(mergeX-120,cy-120,240,240);

      // Draw each wave
      WAVES.forEach((wave,wi)=>{
        phases[wi] += wave.speed;
        const startY = LABEL_TOPS[wi]*H;
        ctx.beginPath();
        const steps = 200;
        for(let s=0; s<=steps; s++){
          const x = (s/steps)*W;
          if(x > mergeX) break;
          const y = getWaveY(wi,x,W,H);
          s===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
        }
        const [r,g,b] = wave.color;
        // gradient stroke: full color → fades near merge
        const sg = ctx.createLinearGradient(0,0,mergeX,0);
        sg.addColorStop(0,`rgba(${r},${g},${b},0.7)`);
        sg.addColorStop(0.7,`rgba(${r},${g},${b},0.55)`);
        sg.addColorStop(1,`rgba(${r},${g},${b},0.1)`);
        ctx.strokeStyle = sg;
        ctx.lineWidth = 1.8;
        ctx.lineJoin = 'round'; ctx.lineCap = 'round';
        ctx.stroke();

        // Node dots along the wave
        [0.15, 0.30, 0.45].forEach(frac=>{
          const nx = frac*mergeX;
          const ny = getWaveY(wi,nx,W,H);
          ctx.beginPath();
          ctx.arc(nx,ny,2.5,0,Math.PI*2);
          ctx.fillStyle = `rgba(${r},${g},${b},0.5)`;
          ctx.fill();
        });
      });

      // Song fragment labels along waves
      ctx.font = '500 9px "Space Grotesk", sans-serif';
      ctx.textBaseline = 'middle';
      fragments.forEach(f=>{
        if(f.frac > 0.95) return;
        const x = f.frac * mergeX;
        const y = getWaveY(f.wi, x, W, H);
        const [r,g,b] = WAVES[f.wi].color;
        ctx.fillStyle = `rgba(${r},${g},${b},0.28)`;
        ctx.fillText(f.text, x+8, y-10);
      });

      // Merged lime wave right of center
      ctx.beginPath();
      for(let s=0; s<=120; s++){
        const x = mergeX + (s/120)*(W-mergeX);
        const y = cy + 20*Math.sin(phases[0] + x*0.014);
        s===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
      }
      const limeGrad = ctx.createLinearGradient(mergeX,0,W,0);
      limeGrad.addColorStop(0,'rgba(160,255,100,0.4)');
      limeGrad.addColorStop(0.2,'rgba(160,255,100,0.95)');
      limeGrad.addColorStop(1,'rgba(160,255,100,0.6)');
      ctx.strokeStyle = limeGrad;
      ctx.lineWidth = 2.5;
      ctx.shadowColor = 'rgba(160,255,100,0.5)';
      ctx.shadowBlur = 18;
      ctx.stroke();
      ctx.shadowBlur = 0;

      // Node dots on merged wave
      [0.15,0.4,0.65,0.88].forEach(f=>{
        const x = mergeX + f*(W-mergeX);
        const y = cy + 20*Math.sin(phases[0]+x*0.014);
        ctx.beginPath(); ctx.arc(x,y,3,0,Math.PI*2);
        ctx.fillStyle = 'rgba(160,255,100,0.7)';
        ctx.shadowColor = 'rgba(160,255,100,0.8)'; ctx.shadowBlur = 8;
        ctx.fill(); ctx.shadowBlur = 0;
      });

      // Merge point pulse
      const pulse = 0.5 + 0.5*Math.sin(Date.now()*0.003);
      ctx.beginPath();
      ctx.arc(mergeX, cy, 5+pulse*3, 0, Math.PI*2);
      ctx.fillStyle = `rgba(160,255,100,${0.3+pulse*0.2})`;
      ctx.shadowColor = 'rgba(160,255,100,0.9)'; ctx.shadowBlur = 20+pulse*10;
      ctx.fill(); ctx.shadowBlur = 0;
      ctx.beginPath(); ctx.arc(mergeX,cy,4,0,Math.PI*2);
      ctx.fillStyle = 'rgba(160,255,100,1)'; ctx.fill();

      rafRef.current = requestAnimationFrame(draw);
    };
    draw();
    return ()=>{ cancelAnimationFrame(rafRef.current); window.removeEventListener('resize', resize); };
  },[]);

  return <canvas ref={canvasRef} style={{position:'absolute',inset:0,width:'100%',height:'100%'}}/>;
};

              value={url} onChange={e=>{setUrl(e.target.value); if(e.target.value) setSelected('url');}}
              style={{marginBottom:12}}/>
            <div style={{color:'var(--text3)',fontSize:13}}>
              e.g. https://open.spotify.com/playlist/37i9dQZF1DX…
            </div>
          </div>
        )}

        <button className="btn-primary" onClick={()=>selected&&onNext(selected)}
          style={{width:'100%',justifyContent:'center',
            opacity:selected?1:0.4,pointerEvents:selected?'auto':'none'}}>
          Continue to Filter Lab
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        </button>
      </div>
    </div>
  );
};

/* ══════════════════════════════════
   SCREEN 3 — FILTER LAB
══════════════════════════════════ */
const FilterScreen = ({playlist, onNext, onBack}) => {
  const pl = PLAYLISTS.find(p=>p.id===playlist) || PLAYLISTS[0];
  const [genres, setGenres] = useState([]);
  const [moods, setMoods] = useState([]);
  const [eras, setEras] = useState([]);
  const [energy, setEnergy] = useState(50);
  const [bpm, setBpm] = useState([60, 160]);
  const [minMatch, setMinMatch] = useState(70);

  const toggle = (arr, setArr, id) =>
    setArr(prev => prev.includes(id) ? prev.filter(x=>x!==id) : [...prev, id]);

  const hasFilter = genres.length>0||moods.length>0||eras.length>0;
  const matchCount = SAMPLE_SONGS.filter(s=>
    (genres.length===0||genres.includes(s.genre)) && s.match>=minMatch
  ).length;

  return (
    <div className="screen" style={{padding:'48px 24px',alignItems:'center'}}>
      <div style={{width:'100%',maxWidth:580}}>
        <Steps current={3}/>

        <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:28}}>
          <button className="btn-icon" onClick={onBack}>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
          </button>
          <div>
            <h2 style={{fontFamily:'Space Grotesk',fontWeight:700,fontSize:28,letterSpacing:'-0.03em'}}>Filter Lab</h2>
            <div style={{color:'var(--text3)',fontSize:13,marginTop:2,display:'flex',alignItems:'center',gap:8}}>
              <CoverArt hue={pl.cover} size={18} radius={4} name={pl.name}/>
              {pl.name} · {pl.count} songs
            </div>
          </div>
        </div>

        {/* Genres */}
        <div className="card" style={{padding:24,marginBottom:16}}>
          <div className="section-label">Genre</div>
          <div style={{display:'flex',flexWrap:'wrap',gap:8}}>
            {GENRES.map(g=>{
              const active = genres.includes(g.id);
              const c = colorVar(g.color);
              return (
                <div key={g.id} className={`pill ${active?'active':''}`}
                  onClick={()=>toggle(genres,setGenres,g.id)}
                  style={active?{background:c,color:'var(--bg)',boxShadow:`0 0 16px ${c}`}:{}}>
                  <span style={{fontSize:10}}>{g.emoji}</span> {g.label}
                </div>
              );
            })}
          </div>
        </div>

        {/* Mood */}
        <div className="card" style={{padding:24,marginBottom:16}}>
          <div className="section-label">Mood</div>
          <div style={{display:'flex',flexWrap:'wrap',gap:8}}>
            {MOODS.map(m=>{
              const active = moods.includes(m.id);
              const c = colorVar(m.color);
              return (
                <div key={m.id} className={`pill ${active?'active':''}`}
                  onClick={()=>toggle(moods,setMoods,m.id)}
                  style={active?{background:c,color:'var(--bg)',boxShadow:`0 0 16px ${c}`}:{}}>
                  {m.label}
                </div>
              );
            })}
          </div>
        </div>

        {/* Era */}
        <div className="card" style={{padding:24,marginBottom:16}}>
          <div className="section-label">Era</div>
          <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
            {ERAS.map(e=>{
              const active = eras.includes(e);
              return (
                <div key={e} className={`pill ${active?'active':''}`}
                  onClick={()=>toggle(eras,setEras,e)}
                  style={active?{background:'var(--sky)',color:'var(--bg)',boxShadow:'0 0 16px var(--sky)'}:{
                    fontFamily:'Space Grotesk',fontWeight:600,
                  }}>
                  {e}
                </div>
              );
            })}
          </div>
        </div>

        {/* Sliders */}
        <div className="card" style={{padding:24,marginBottom:28}}>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:24}}>
            <div>
              <div className="section-label">Energy Level</div>
              <div style={{display:'flex',justifyContent:'space-between',marginBottom:10}}>
                <span style={{fontSize:13,color:'var(--text2)'}}>Chill</span>
                <span style={{fontSize:13,color:'var(--lime)',fontFamily:'Space Grotesk',fontWeight:600}}>{energy}%</span>
                <span style={{fontSize:13,color:'var(--text2)'}}>Hype</span>
              </div>
              <input type="range" min={0} max={100} value={energy} onChange={e=>setEnergy(+e.target.value)}
                style={{background:`linear-gradient(90deg,var(--lime) ${energy}%,var(--border) ${energy}%)`}}/>
            </div>
            <div>
              <div className="section-label">Min. Match Score</div>
              <div style={{display:'flex',justifyContent:'space-between',marginBottom:10}}>
                <span style={{fontSize:13,color:'var(--text2)'}}>Loose</span>
                <span style={{fontSize:13,color:'var(--lime)',fontFamily:'Space Grotesk',fontWeight:600}}>{minMatch}%</span>
                <span style={{fontSize:13,color:'var(--text2)'}}>Strict</span>
              </div>
              <input type="range" min={50} max={99} value={minMatch} onChange={e=>setMinMatch(+e.target.value)}
                style={{background:`linear-gradient(90deg,var(--lime) ${(minMatch-50)/49*100}%,var(--border) ${(minMatch-50)/49*100}%)`}}/>
            </div>
          </div>
        </div>

        {/* CTA */}
        <div style={{
          display:'flex',alignItems:'center',justifyContent:'space-between',
          background:'var(--surface)',border:'1px solid var(--border)',
          borderRadius:16,padding:'16px 20px',
        }}>
          <div>
            <div style={{fontFamily:'Space Grotesk',fontWeight:600,fontSize:16}}>
              <span style={{color:'var(--lime)'}}>{matchCount}</span> songs match
            </div>
            <div style={{color:'var(--text3)',fontSize:13,marginTop:2}}>
              {hasFilter ? `${genres.length+moods.length+eras.length} filter${genres.length+moods.length+eras.length!==1?'s':''} active` : 'Select filters above'}
            </div>
          </div>
          <button className="btn-primary" onClick={onNext}
            style={{opacity:matchCount>0?1:0.4,pointerEvents:matchCount>0?'auto':'none'}}>
            Preview Results
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
          </button>
        </div>
      </div>
    </div>
  );
};

/* ══════════════════════════════════
   SCREEN 4 — RESULTS + CREATE
══════════════════════════════════ */
const ResultsScreen = ({playlist, onBack, onDone}) => {
  const pl = PLAYLISTS.find(p=>p.id===playlist) || PLAYLISTS[0];
  const [name, setName] = useState('Pop Essentials ✦');
  const [creating, setCreating] = useState(false);
  const [done, setDone] = useState(false);
  const [playingId, setPlayingId] = useState(null);
  const [confetti, setConfetti] = useState([]);

  const filtered = SAMPLE_SONGS.filter(s=>s.genre==='pop'||s.genre==='hiphop').slice(0,12);

  const handleCreate = () => {
    setCreating(true);
    setTimeout(()=>{
      setCreating(false);
      setDone(true);
      // spawn confetti
      const pieces = Array.from({length:30},(_,i)=>({
        id:i,
        x: 30+Math.random()*40,
        color:['var(--lime)','var(--violet)','var(--coral)','var(--sky)'][i%4],
        delay: Math.random()*0.5,
        dur: 0.8+Math.random()*0.6,
      }));
      setConfetti(pieces);
      setTimeout(()=>setConfetti([]),2000);
    },2000);
  };

  if(done) return (
    <div className="screen" style={{justifyContent:'center',padding:40,textAlign:'center',position:'relative'}}>
      {confetti.map(c=>(
        <div key={c.id} className="confetti-piece" style={{
          left:`${c.x}%`,top:'20%',
          background:c.color,
          animationDuration:`${c.dur}s`,
          animationDelay:`${c.delay}s`,
          borderRadius:c.id%3===0?'50%':undefined,
        }}/>
      ))}
      <div style={{maxWidth:420}}>
        <div style={{
          width:96,height:96,borderRadius:'50%',
          background:'linear-gradient(135deg,var(--violet),var(--lime))',
          display:'flex',alignItems:'center',justifyContent:'center',
          margin:'0 auto 32px',fontSize:44,
          boxShadow:'0 0 60px oklch(0.82 0.22 145 / 0.4)',
          animation:'screenIn 0.5s cubic-bezier(0.22,1,0.36,1)',
        }}>✦</div>
        <h2 style={{fontFamily:'Space Grotesk',fontWeight:700,fontSize:36,letterSpacing:'-0.03em',marginBottom:12}}>
          Playlist Created!
        </h2>
        <p style={{color:'var(--text2)',fontSize:16,lineHeight:1.6,marginBottom:8}}>
          <span style={{color:'var(--lime)',fontWeight:600}}>"{name}"</span>
        </p>
        <p style={{color:'var(--text3)',fontSize:14,marginBottom:40}}>
          {filtered.length} songs · now in your Spotify library
        </p>
        <div style={{display:'flex',gap:12,justifyContent:'center',flexWrap:'wrap'}}>
          <button className="btn-primary">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.559.3z"/></svg>
            Open in Spotify
          </button>
          <button className="btn-ghost" onClick={onBack}>Filter Another</button>
        </div>
      </div>
    </div>
  );

  return (
    <div className="screen" style={{padding:'48px 24px',alignItems:'center'}}>
      <div style={{width:'100%',maxWidth:560}}>
        <Steps current={4}/>
        <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:28}}>
          <button className="btn-icon" onClick={onBack}>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
          </button>
          <div>
            <h2 style={{fontFamily:'Space Grotesk',fontWeight:700,fontSize:28,letterSpacing:'-0.03em'}}>
              {filtered.length} songs found
            </h2>
            <div style={{color:'var(--text3)',fontSize:13,marginTop:2}}>Pop · Hip-Hop · ≥70% match</div>
          </div>
        </div>

        {/* Name input */}
        <div className="card" style={{padding:20,marginBottom:16}}>
          <div className="section-label">New Playlist Name</div>
          <input className="text-input" value={name} onChange={e=>setName(e.target.value)}
            style={{marginTop:4}}/>
        </div>

        {/* Song list */}
        <div className="card" style={{padding:'8px 12px',marginBottom:20,maxHeight:380,overflowY:'auto'}}>
          {filtered.map((s,i)=>(
            <div key={s.id} className="song-row" onClick={()=>setPlayingId(playingId===s.id?null:s.id)}>
              <div style={{
                width:32,height:32,borderRadius:8,flexShrink:0,
                background:`linear-gradient(135deg, oklch(0.25 0.12 ${s.genre==='pop'?145:310}), oklch(0.45 0.18 ${s.genre==='pop'?145:310}))`,
                display:'flex',alignItems:'center',justifyContent:'center',
                fontSize:12,color:'white',fontFamily:'Space Grotesk',fontWeight:700,
              }}>
                {playingId===s.id
                  ? <div style={{display:'flex',alignItems:'flex-end',gap:1.5,height:14}}>
                      {[1,2,3].map(b=>(
                        <div key={b} style={{width:2,height:`${40+Math.random()*60}%`,background:'var(--lime)',
                          borderRadius:1,animation:`waveAnim ${0.4+b*0.1}s ease-in-out infinite alternate`,
                          animationPlayState:'running'}}/>
                      ))}
                    </div>
                  : <span style={{opacity:0.8}}>{i+1}</span>
                }
              </div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontFamily:'Space Grotesk',fontWeight:500,fontSize:14,
                  whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis',
                  color:playingId===s.id?'var(--lime)':'var(--text)'}}>{s.title}</div>
                <div style={{color:'var(--text3)',fontSize:12,marginTop:1}}>{s.artist}</div>
              </div>
              <div style={{
                fontSize:11,fontFamily:'Space Grotesk',fontWeight:600,
                padding:'3px 8px',borderRadius:100,
                background:`oklch(0.82 0.22 145 / ${(s.match-70)/30*0.25+0.08})`,
                color:'var(--lime)',
              }}>{s.match}%</div>
              <div style={{color:'var(--text3)',fontSize:12,fontFamily:'Space Grotesk',marginLeft:4}}>{s.dur}</div>
            </div>
          ))}
        </div>

        {/* Create */}
        <button className="btn-primary" onClick={handleCreate}
          style={{width:'100%',justifyContent:'center',gap:12,
            opacity:name.trim()?1:0.4,pointerEvents:name.trim()?'auto':'none'}}>
          {creating ? (
            <>
              <div className="spinner" style={{width:20,height:20,borderWidth:2}}/>
              Creating your playlist…
            </>
          ) : (
            <>
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><circle cx="12" cy="12" r="10"/><path d="M12 8v8M8 12h8"/></svg>
              Create "{name}"
            </>
          )}
        </button>
      </div>
    </div>
  );
};

/* ══════════════════════════════════
   TWEAKS PANEL
══════════════════════════════════ */
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accentColor": "lime",
  "roundness": 16,
  "density": "comfortable"
}/*EDITMODE-END*/;

/* ══════════════════════════════════
   ROOT APP
══════════════════════════════════ */
const App = () => {
  const [screen, setScreen] = useState('hero');
  const [playlist, setPlaylist] = useState(null);

  const go = (s) => setScreen(s);

  const screens = {
    hero:    <HeroScreen    onNext={()=>go('pick')} />,
    pick:    <PlaylistScreen onNext={id=>{setPlaylist(id);go('filter');}} onBack={()=>go('hero')} />,
    filter:  <FilterScreen  playlist={playlist} onNext={()=>go('results')} onBack={()=>go('pick')} />,
    results: <ResultsScreen playlist={playlist} onBack={()=>go('filter')} onDone={()=>go('hero')} />,
  };

  return (
    <>
      {screen !== 'hero' && <OrbField/>}
      <div className="noise"/>
      {screens[screen]}
    </>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);

/* ── Tweaks protocol ── */
window.addEventListener('message',e=>{
  if(e.data?.type==='__activate_edit_mode') {
    document.getElementById('tweaks-placeholder')?.setAttribute('style','display:block');
  }
  if(e.data?.type==='__deactivate_edit_mode') {
    document.getElementById('tweaks-placeholder')?.setAttribute('style','display:none');
  }
});
window.parent.postMessage({type:'__edit_mode_available'},'*');
</script>
</body>
